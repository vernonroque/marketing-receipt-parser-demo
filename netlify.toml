# netlify.toml — Netlify configuration for Receipt Parser Demo

[build]
  # The folder Netlify will serve as the website
  publish = "frontend"

  # Where Netlify looks for serverless functions
  functions = "netlify/functions"

  # Install npm dependencies before deploying
  command = "npm install"

# ── Redirect API calls to the serverless function ──────────────────────────────
# The frontend calls /.netlify/functions/parse-receipt directly, so no
# redirect is needed. But this is here as a convenience alias if you want
# to use /api/parse-receipt in the future.

[functions."parse-receipt"]
  timeout = 26

[[redirects]]
  from = "/api/parse-receipt"
  to = "/.netlify/functions/parse-receipt"
  status = 200

# ── Security headers ────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets ─────────────────────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
